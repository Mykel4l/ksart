<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Ksenia Art</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #e63946;
            --dark: #0a0a0a;
            --dark-2: #111;
            --dark-3: #1a1a1a;
            --gray: #999;
            --white: #f5f5f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--white);
            min-height: 100vh;
        }

        /* Login */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: var(--dark-2);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        .login-box h1 { font-size: 1.4rem; margin-bottom: 8px; }
        .login-box p { color: var(--gray); font-size: 0.9rem; margin-bottom: 24px; }
        .login-box input {
            width: 100%;
            padding: 14px 16px;
            background: var(--dark-3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--white);
            font-size: 0.95rem;
            margin-bottom: 16px;
            outline: none;
        }
        .login-box input:focus { border-color: var(--primary); }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .login-box button:hover { opacity: 0.9; }
        .login-error { color: var(--primary); font-size: 0.85rem; margin-top: 8px; display: none; }

        /* Dashboard Layout */
        .dashboard { display: none; }
        .dashboard.active { display: flex; min-height: 100vh; }

        .sidebar {
            width: 240px;
            background: var(--dark-2);
            border-right: 1px solid rgba(255,255,255,0.06);
            padding: 24px 0;
            flex-shrink: 0;
        }
        .sidebar-brand {
            padding: 0 24px 24px;
            font-weight: 700;
            font-size: 1.1rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 16px;
        }
        .sidebar-brand span { color: var(--primary); }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            color: var(--gray);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            color: var(--white);
            background: rgba(255,255,255,0.04);
        }
        .sidebar-nav a.active { border-left: 3px solid var(--primary); }
        .sidebar-nav a i { width: 18px; text-align: center; }

        .main-content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            max-height: 100vh;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .page-header h2 { font-size: 1.5rem; }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: var(--white); }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        .btn-danger { background: #dc2626; color: white; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--dark-2);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 24px;
        }
        .stat-card .stat-label { color: var(--gray); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-card .stat-value { font-size: 2rem; font-weight: 700; }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--dark-2);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .data-table th, .data-table td {
            padding: 14px 20px;
            text-align: left;
            font-size: 0.88rem;
        }
        .data-table th {
            background: var(--dark-3);
            color: var(--gray);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
        .data-table td { border-top: 1px solid rgba(255,255,255,0.04); }
        .data-table tr:hover td { background: rgba(255,255,255,0.02); }

        .badge {
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-new { background: rgba(230,57,70,0.2); color: var(--primary); }
        .badge-reviewed { background: rgba(244,162,97,0.2); color: #f4a261; }
        .badge-replied { background: rgba(42,157,143,0.2); color: #2a9d8f; }
        .badge-closed { background: rgba(153,153,153,0.2); color: var(--gray); }

        /* Panel pages */
        .panel { display: none; }
        .panel.active { display: block; }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard.active { flex-direction: column; }
            .sidebar { width: 100%; }
            .sidebar-nav { display: flex; overflow-x: auto; }
            .sidebar-nav a { white-space: nowrap; padding: 12px 16px; }
            .main-content { padding: 20px; max-height: none; }
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>Ksenia Art <span style="color:var(--primary)">Admin</span></h1>
            <p>Enter your admin token to manage the site.</p>
            <input type="password" id="tokenInput" placeholder="Admin token" autofocus>
            <button onclick="login()">Sign In</button>
            <div class="login-error" id="loginError">Invalid token. Please try again.</div>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <nav class="sidebar">
            <div class="sidebar-brand">KS<span>ART</span> Admin</div>
            <div class="sidebar-nav">
                <a class="active" data-panel="overview"><i class="fas fa-home"></i> Overview</a>
                <a data-panel="portfolio-panel"><i class="fas fa-images"></i> Portfolio</a>
                <a data-panel="posts-panel"><i class="fas fa-blog"></i> Blog Posts</a>
                <a data-panel="inquiries-panel"><i class="fas fa-envelope"></i> Inquiries</a>
                <a data-panel="subscribers-panel"><i class="fas fa-users"></i> Subscribers</a>
                <a data-panel="workshops-panel"><i class="fas fa-chalkboard-teacher"></i> Workshops</a>
                <a data-panel="bookings-panel"><i class="fas fa-calendar-check"></i> Bookings</a>
                <a onclick="logout()" style="margin-top:auto;"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </nav>
        <main class="main-content">

            <!-- Overview -->
            <div class="panel active" id="overview">
                <div class="page-header"><h2>Dashboard</h2></div>
                <div class="stats-grid" id="statsGrid"></div>
                <h3 style="margin-bottom:16px;">Recent Inquiries</h3>
                <div id="recentInquiries"></div>
            </div>

            <!-- Portfolio -->
            <div class="panel" id="portfolio-panel">
                <div class="page-header">
                    <h2>Portfolio</h2>
                </div>
                <div id="portfolioTable"></div>
            </div>

            <!-- Blog Posts -->
            <div class="panel" id="posts-panel">
                <div class="page-header">
                    <h2>Blog Posts</h2>
                </div>
                <div id="postsTable"></div>
            </div>

            <!-- Inquiries -->
            <div class="panel" id="inquiries-panel">
                <div class="page-header"><h2>Inquiries</h2></div>
                <div id="inquiriesTable"></div>
            </div>

            <!-- Subscribers -->
            <div class="panel" id="subscribers-panel">
                <div class="page-header"><h2>Newsletter Subscribers</h2></div>
                <div id="subscribersTable"></div>
            </div>

            <!-- Workshops -->
            <div class="panel" id="workshops-panel">
                <div class="page-header"><h2>Workshops</h2></div>
                <div id="workshopsTable"></div>
            </div>

            <!-- Bookings -->
            <div class="panel" id="bookings-panel">
                <div class="page-header"><h2>Bookings</h2></div>
                <div id="bookingsTable"></div>
            </div>
        </main>
    </div>

    <script>
        let TOKEN = '';

        const headers = () => ({
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${TOKEN}`
        });

        const api = async (path, opts = {}) => {
            const res = await fetch(path, { ...opts, headers: { ...headers(), ...(opts.headers || {}) } });
            return res.json();
        };

        // --- Auth ---
        function login() {
            TOKEN = document.getElementById('tokenInput').value.trim();
            if (!TOKEN) return;
            // Test token with stats endpoint
            api('/api/stats').then(data => {
                if (data.error) {
                    document.getElementById('loginError').style.display = 'block';
                    TOKEN = '';
                } else {
                    sessionStorage.setItem('ksart_token', TOKEN);
                    showDashboard();
                    loadOverview();
                }
            }).catch(() => {
                document.getElementById('loginError').style.display = 'block';
                TOKEN = '';
            });
        }

        function logout() {
            TOKEN = '';
            sessionStorage.removeItem('ksart_token');
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('tokenInput').value = '';
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
        }

        // Auto-login from session
        const savedToken = sessionStorage.getItem('ksart_token');
        if (savedToken) {
            TOKEN = savedToken;
            showDashboard();
            loadOverview();
        }

        // Enter key on token input
        document.getElementById('tokenInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });

        // --- Navigation ---
        document.querySelectorAll('.sidebar-nav a[data-panel]').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelectorAll('.sidebar-nav a').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                const panel = document.getElementById(link.dataset.panel);
                if (panel) {
                    panel.classList.add('active');
                    loadPanelData(link.dataset.panel);
                }
            });
        });

        function loadPanelData(panel) {
            switch(panel) {
                case 'overview': loadOverview(); break;
                case 'portfolio-panel': loadPortfolioAdmin(); break;
                case 'posts-panel': loadPostsAdmin(); break;
                case 'inquiries-panel': loadInquiriesAdmin(); break;
                case 'subscribers-panel': loadSubscribersAdmin(); break;
                case 'workshops-panel': loadWorkshopsAdmin(); break;
                case 'bookings-panel': loadBookingsAdmin(); break;
            }
        }

        // --- Overview ---
        async function loadOverview() {
            const stats = await api('/api/stats');
            if (stats.error) return;
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-label">Portfolio Items</div><div class="stat-value">${stats.portfolio}</div></div>
                <div class="stat-card"><div class="stat-label">Published Posts</div><div class="stat-value">${stats.posts}</div></div>
                <div class="stat-card"><div class="stat-label">New Inquiries</div><div class="stat-value" style="color:var(--primary)">${stats.newInquiries}</div></div>
                <div class="stat-card"><div class="stat-label">Subscribers</div><div class="stat-value">${stats.subscribers}</div></div>
                <div class="stat-card"><div class="stat-label">Bookings</div><div class="stat-value">${stats.bookings}</div></div>
            `;
            // Recent inquiries
            const inquiries = await api('/api/inquiries');
            if (Array.isArray(inquiries)) {
                renderInquiriesTable(inquiries.slice(0, 5), 'recentInquiries');
            }
        }

        // --- Portfolio ---
        async function loadPortfolioAdmin() {
            const items = await api('/api/portfolio');
            document.getElementById('portfolioTable').innerHTML = `
                <table class="data-table">
                    <thead><tr><th>Image</th><th>Title</th><th>Category</th><th>Dimensions</th><th>Featured</th><th>Actions</th></tr></thead>
                    <tbody>${items.map(i => `
                        <tr>
                            <td><img src="${i.image_url}" style="width:60px;height:40px;object-fit:cover;border-radius:6px;"></td>
                            <td><strong>${i.title}</strong></td>
                            <td>${i.category}</td>
                            <td>${i.dimensions || '—'}</td>
                            <td>${i.featured ? '⭐' : '—'}</td>
                            <td><button class="btn btn-sm btn-danger" onclick="deleteItem('portfolio', ${i.id})"><i class="fas fa-trash"></i></button></td>
                        </tr>
                    `).join('')}</tbody>
                </table>
            `;
        }

        // --- Posts ---
        async function loadPostsAdmin() {
            const posts = await api('/api/posts?all=1');
            document.getElementById('postsTable').innerHTML = `
                <table class="data-table">
                    <thead><tr><th>Title</th><th>Category</th><th>Status</th><th>Published</th><th>Actions</th></tr></thead>
                    <tbody>${posts.map(p => `
                        <tr>
                            <td><strong>${p.title}</strong></td>
                            <td>${p.category}</td>
                            <td><span class="badge ${p.published ? 'badge-replied' : 'badge-closed'}">${p.published ? 'Published' : 'Draft'}</span></td>
                            <td>${p.published_at ? new Date(p.published_at).toLocaleDateString() : '—'}</td>
                            <td><button class="btn btn-sm btn-danger" onclick="deleteItem('posts', ${p.id})"><i class="fas fa-trash"></i></button></td>
                        </tr>
                    `).join('')}</tbody>
                </table>
            `;
        }

        // --- Inquiries ---
        function renderInquiriesTable(inquiries, containerId) {
            document.getElementById(containerId).innerHTML = `
                <table class="data-table">
                    <thead><tr><th>Name</th><th>Email</th><th>Service</th><th>Budget</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
                    <tbody>${inquiries.map(i => `
                        <tr>
                            <td><strong>${i.first_name} ${i.last_name}</strong></td>
                            <td><a href="mailto:${i.email}" style="color:var(--primary)">${i.email}</a></td>
                            <td>${i.service}</td>
                            <td>${i.budget || '—'}</td>
                            <td><span class="badge badge-${i.status}">${i.status}</span></td>
                            <td>${new Date(i.created_at).toLocaleDateString()}</td>
                            <td>
                                <select onchange="updateInquiryStatus(${i.id}, this.value)" style="background:var(--dark-3);color:var(--white);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:4px 8px;font-size:0.8rem;">
                                    <option value="new" ${i.status==='new'?'selected':''}>New</option>
                                    <option value="reviewed" ${i.status==='reviewed'?'selected':''}>Reviewed</option>
                                    <option value="replied" ${i.status==='replied'?'selected':''}>Replied</option>
                                    <option value="closed" ${i.status==='closed'?'selected':''}>Closed</option>
                                </select>
                            </td>
                        </tr>
                    `).join('')}</tbody>
                </table>
            `;
        }

        async function loadInquiriesAdmin() {
            const inquiries = await api('/api/inquiries');
            if (Array.isArray(inquiries)) renderInquiriesTable(inquiries, 'inquiriesTable');
        }

        async function updateInquiryStatus(id, status) {
            await api(`/api/inquiries/${id}`, { method: 'PUT', body: JSON.stringify({ status }) });
        }

        // --- Subscribers ---
        async function loadSubscribersAdmin() {
            const subs = await api('/api/subscribers');
            if (!Array.isArray(subs)) return;
            document.getElementById('subscribersTable').innerHTML = `
                <p style="color:var(--gray);margin-bottom:16px;">${subs.length} active subscriber${subs.length !== 1 ? 's' : ''}</p>
                <table class="data-table">
                    <thead><tr><th>Email</th><th>Subscribed</th></tr></thead>
                    <tbody>${subs.map(s => `
                        <tr>
                            <td>${s.email}</td>
                            <td>${new Date(s.subscribed_at).toLocaleDateString()}</td>
                        </tr>
                    `).join('')}</tbody>
                </table>
            `;
        }

        // --- Workshops ---
        async function loadWorkshopsAdmin() {
            const workshops = await api('/api/workshops');
            document.getElementById('workshopsTable').innerHTML = `
                <table class="data-table">
                    <thead><tr><th>Title</th><th>Date</th><th>Spots Left</th><th>Price</th><th>Level</th></tr></thead>
                    <tbody>${workshops.map(w => `
                        <tr>
                            <td><strong>${w.title}</strong></td>
                            <td>${new Date(w.date).toLocaleDateString()}</td>
                            <td>${w.spots_left}/${w.capacity}</td>
                            <td>$${w.price}</td>
                            <td>${w.level}</td>
                        </tr>
                    `).join('')}</tbody>
                </table>
            `;
        }

        // --- Bookings ---
        async function loadBookingsAdmin() {
            const bookings = await api('/api/bookings');
            if (!Array.isArray(bookings)) return;
            document.getElementById('bookingsTable').innerHTML = `
                <table class="data-table">
                    <thead><tr><th>Workshop</th><th>Name</th><th>Email</th><th>Guests</th><th>Status</th><th>Date</th></tr></thead>
                    <tbody>${bookings.map(b => `
                        <tr>
                            <td>${b.workshop_title}</td>
                            <td><strong>${b.name}</strong></td>
                            <td><a href="mailto:${b.email}" style="color:var(--primary)">${b.email}</a></td>
                            <td>${b.guests}</td>
                            <td><span class="badge badge-replied">${b.status}</span></td>
                            <td>${new Date(b.created_at).toLocaleDateString()}</td>
                        </tr>
                    `).join('')}</tbody>
                </table>
            `;
        }

        // --- Delete ---
        async function deleteItem(resource, id) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            await api(`/api/${resource}/${id}`, { method: 'DELETE' });
            // Reload the current panel
            const activePanel = document.querySelector('.sidebar-nav a.active');
            if (activePanel) loadPanelData(activePanel.dataset.panel);
        }
    </script>
</body>
</html>
